name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - Sources/**/README.md
      - LICENSE
  pull_request:
    paths-ignore:
      - README.md
      - Sources/**/README.md
      - LICENSE
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    name: Package Tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Swift package tests
        run: swift test
